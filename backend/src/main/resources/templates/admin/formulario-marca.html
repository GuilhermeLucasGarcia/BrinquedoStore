<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Nova Marca - BrinquedoStore</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link rel="stylesheet" th:href="@{/css/style.css}">
</head>
<body>

    <div class="container-fluid px-0">
        
        <!-- Header -->
        <div class="top-header">
            <div class="header-left">
                <a href="/" class="logo-container text-decoration-none">
                    <img th:src="@{/img/logo.png}" class="logo-be-happy" alt="Logo">
                    <span class="logo-text-be-happy">Be Happy</span>
                </a>
            </div>
            
            <div class="header-center">
                <div class="search-bar-container">
                    <div class="input-group">
                        <input type="text" class="form-control search-input rounded-pill ps-4" placeholder="Buscar no painel administrativo...">
                        <span class="position-absolute end-0 top-50 translate-middle-y pe-3 text-primary" style="z-index: 5;">
                            <i class="fas fa-search"></i>
                        </span>
                    </div>
                </div>
            </div>

            <div class="header-right">
                <div class="d-flex align-items-center gap-3">
                    <span class="text-white small"><i class="fas fa-user-shield me-1"></i> Admin</span>
                    <a href="/" class="btn btn-light btn-sm rounded-pill text-primary">Ver Loja</a>
                </div>
            </div>
        </div>

        <div class="container-fluid px-4 pb-5">
            <div class="row g-4">
                <!-- Sidebar (Left) -->
                <div class="col-md-3 col-lg-2">
                    <div class="sidebar-container">
                        <div class="sidebar-header">
                            <i class="fas fa-bars me-2"></i> Menu
                        </div>
                        <ul class="sidebar-menu">
                            <li><a href="/"><i class="fas fa-home me-2"></i> Home</a></li>
                            <li><a href="/catalogo"><i class="fas fa-box-open me-2"></i> Catálogo</a></li>
                            <li>
                                <a href="#adminSubmenu" data-bs-toggle="collapse" class="active" aria-expanded="true">
                                    <i class="fas fa-cog me-2"></i> Administração
                                </a>
                                <ul class="collapse show submenu" id="adminSubmenu">
                                    <li><a href="/administracao">Produtos</a></li>
                                    <li><a href="/administracao/marcas" class="active">Marcas</a></li>
                                </ul>
                            </li>
                            <li><a href="/sobre"><i class="fas fa-users me-2"></i> Equipe</a></li>
                        </ul>
                    </div>
                </div>

                <!-- Main Content (Right) -->
                <div class="col-md-9 col-lg-10">
                    <div class="main-content">
                        <div class="d-flex justify-content-between align-items-center mb-4 border-bottom pb-3">
                            <h2 class="section-title mb-0 border-0 p-0" th:text="${marca.id == null ? 'Nova Marca' : 'Editar Marca'}">Marca</h2>
                            <a href="/administracao/marcas" class="btn btn-outline-secondary btn-sm shadow-sm">
                                <i class="fas fa-arrow-left me-2"></i>Voltar
                            </a>
                        </div>
                        
                        <div class="card border-0 shadow-sm rounded-4">
                            <div class="card-body p-4">
                                <form th:action="@{/administracao/marcas/salvar}" th:object="${marca}" method="post">
                                    <input type="hidden" th:field="*{id}">
                                    
                                    <div class="mb-4">
                                        <label for="nome" class="form-label fw-bold text-secondary">Nome da Marca</label>
                                        <input type="text" class="form-control form-control-lg border-2" id="nome" th:field="*{nome}" placeholder="Ex: Estrela, Mattel, LEGO..." required autofocus>
                                        <div class="form-text">Informe o nome completo da marca fabricante.</div>
                                    </div>

                                    <div class="d-flex justify-content-end gap-3 pt-3 border-top">
                                        <a href="/administracao/marcas" class="btn btn-light btn-lg px-5">Cancelar</a>
                                        <button type="submit" class="btn btn-primary btn-lg px-5">
                                            <i class="fas fa-save me-2"></i>Salvar Marca
                                        </button>
                                    </div>
                                </form>
                            </div>
                        </div>
                    </div>
                </div>
            </div>
        </div>

        <footer class="simple-footer bg-white">
            <div class="container text-center">
                <p class="mb-0">&copy; 2024 Be Happy. Todos os direitos reservados.</p>
            </div>
        </footer>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
