<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Formulário - BrinquedoStore</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link rel="stylesheet" th:href="@{/css/style.css}">
</head>
<body>

    <div class="container-fluid px-4">
        
        <!-- Header -->
        <div class="row align-items-center top-header">
            <div class="col-auto">
                <div class="logo-box">
                    <i class="fas fa-gamepad fa-2x"></i>
                </div>
            </div>
            <div class="col">
                <h1 class="store-title">BrinquedoStore</h1>
            </div>
        </div>

        <div class="row">
            <!-- Sidebar (Left) -->
            <div class="col-md-3 col-lg-2 ps-0 pe-4">
                <div class="sidebar-header">
                    MENU PRINCIPAL
                </div>
                <ul class="sidebar-menu">
                    <li><a href="/"><i class="fas fa-home me-2"></i>Home</a></li>
                    <li><a href="/catalogo"><i class="fas fa-th me-2"></i>Catálogo</a></li>
                    <li><a href="/administracao" class="active"><i class="fas fa-cog me-2"></i>Administração</a></li>
                    <li><a href="/sobre"><i class="fas fa-users me-2"></i>Sobre a Equipe</a></li>
                </ul>
            </div>

            <!-- Main Content (Right) -->
            <div class="col-md-9 col-lg-10">
                <div class="d-flex justify-content-between align-items-center mb-4">
                    <h2 class="section-title mb-0" th:text="${brinquedo.id == null ? 'Novo Brinquedo' : 'Editar Brinquedo'}">Formulário</h2>
                    <a href="/administracao" class="btn btn-outline-secondary"><i class="fas fa-arrow-left me-2"></i>Voltar</a>
                </div>
                
                <div class="card shadow-sm border-0">
                    <div class="card-body p-4">
                        <form th:action="@{/administracao/salvar}" th:object="${brinquedo}" method="post">
                            <input type="hidden" th:field="*{id}" />
                            
                            <div class="row">
                                <div class="col-md-4 mb-3">
                                    <label for="codigo" class="form-label fw-bold">Código</label>
                                    <input type="text" class="form-control" id="codigo" th:field="*{codigo}" required>
                                </div>
                                <div class="col-md-8 mb-3">
                                    <label for="nome" class="form-label fw-bold">Nome (Título)</label>
                                    <input type="text" class="form-control" id="nome" th:field="*{nome}" required>
                                </div>
                            </div>

                            <div class="row">
                                <div class="col-md-6 mb-3">
                                    <label for="categoria" class="form-label fw-bold">Categoria</label>
                                    <select class="form-select" id="categoria" th:field="*{categoria}" required>
                                        <option value="">Selecione uma categoria...</option>
                                        <option th:each="cat : ${categorias}" 
                                                th:value="${cat.id}" 
                                                th:text="${cat.nome}">Categoria</option>
                                    </select>
                                </div>
                                <div class="col-md-6 mb-3">
                                    <label for="marca" class="form-label fw-bold">Marca</label>
                                    <select class="form-select" id="marca" th:field="*{marca}">
                                        <option value="">Selecione uma marca...</option>
                                        <option th:each="m : ${marcas}" 
                                                th:value="${m.id}" 
                                                th:text="${m.nome}">Marca</option>
                                    </select>
                                </div>
                            </div>

                            <div class="row">
                                <div class="col-md-4 mb-3">
                                    <label for="preco" class="form-label fw-bold">Preço (R$)</label>
                                    <input type="number" step="0.01" class="form-control" id="preco" th:field="*{valor}" required>
                                </div>
                                <div class="col-md-8 mb-3">
                                    <label for="imagemUrl" class="form-label fw-bold">URL da Imagem</label>
                                    <input type="text" class="form-control" id="imagemUrl" th:field="*{imagemUrl}" required>
                                </div>
                            </div>

                            <div class="mb-3">
                                <label for="descricao" class="form-label fw-bold">Detalhes (Descrição Completa)</label>
                                <textarea class="form-control" id="descricao" th:field="*{descricao}" rows="5"></textarea>
                            </div>
                            
                            <div class="mb-3 form-check">
                                <input type="checkbox" class="form-check-input" id="emDestaque" th:field="*{emDestaque}">
                                <label class="form-check-label fw-bold" for="emDestaque">Produto em Destaque?</label>
                            </div>

                            <div class="mt-4 text-end">
                                <a href="/administracao" class="btn btn-light me-2">Cancelar</a>
                                <button type="submit" class="btn btn-primary fw-bold px-4"><i class="fas fa-save me-2"></i>Salvar Brinquedo</button>
                            </div>
                        </form>
                    </div>
                </div>
            </div>
        </div>

        <!-- Footer -->
        <footer class="simple-footer mt-5 text-center py-3 text-muted">
            <small>&copy; 2026 BrinquedoStore. Todos os direitos reservados.</small>
        </footer>

    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
