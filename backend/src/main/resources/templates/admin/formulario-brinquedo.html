<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Formulário - BrinquedoStore</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link rel="stylesheet" th:href="@{/css/style.css}">
</head>
<body>

    <div class="container-fluid px-0">
        
        <!-- Header -->
        <div class="top-header">
            <div class="header-left">
                <a href="/" class="logo-container text-decoration-none">
                    <img th:src="@{/img/logo.png}" class="logo-be-happy" alt="Logo">
                    <span class="logo-text-be-happy">Be Happy</span>
                </a>
            </div>
            
            <div class="header-center">
                <div class="search-bar-container">
                    <div class="input-group">
                        <input type="text" class="form-control search-input rounded-pill ps-4"
                               placeholder="Buscar no painel administrativo..."
                               data-live-search-url="/api/search/admin">
                        <span class="position-absolute end-0 top-50 translate-middle-y pe-3 text-primary" style="z-index: 5;">
                            <i class="fas fa-search"></i>
                        </span>
                    </div>
                </div>
            </div>

            <div class="header-right">
                <div class="d-flex align-items-center gap-3">
                    <span class="text-white small"><i class="fas fa-user-shield me-1"></i> Admin</span>
                    <a href="/" class="btn btn-light btn-sm rounded-pill text-primary">Ver Loja</a>
                </div>
            </div>
        </div>

        <div class="container-fluid px-4 pb-5">
            <div class="row g-4">
                <!-- Sidebar (Left) -->
                <div class="col-md-3 col-lg-2">
                    <div class="sidebar-container">
                        <div class="sidebar-header">
                            <i class="fas fa-bars me-2"></i> Menu
                        </div>
                        <ul class="sidebar-menu">
                            <li><a href="/"><i class="fas fa-home me-2"></i> Home</a></li>
                            <li><a href="/catalogo"><i class="fas fa-box-open me-2"></i> Catálogo</a></li>
                            <li th:replace="fragments/sidebar :: adminMenu('produtos', true)"></li>
                            <li><a href="/sobre"><i class="fas fa-users me-2"></i> Equipe</a></li>
                        </ul>
                    </div>
                </div>

                <!-- Main Content (Right) -->
                <div class="col-md-9 col-lg-10">
                    <div class="main-content">
                        <div class="d-flex justify-content-between align-items-center mb-4">
                            <h2 class="section-title mb-0" th:text="${brinquedo.id == null ? 'Novo Brinquedo' : 'Editar Brinquedo'}">Formulário</h2>
                            <a href="/administracao" class="btn btn-outline-secondary"><i class="fas fa-arrow-left me-2"></i>Voltar</a>
                        </div>
                        
                        <div class="card shadow-sm border-0 rounded-4">
                            <div class="card-body p-4">
                                <form th:action="@{/administracao/salvar}" th:object="${brinquedo}" method="post">
                                    <input type="hidden" th:field="*{id}" />
                                    <input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}">
                                    
                                    <div class="row">
                                        <div class="col-md-4 mb-3">
                                            <label for="codigo" class="form-label fw-bold">Código</label>
                                            <input type="text" class="form-control" id="codigo" th:field="*{codigo}" required>
                                        </div>
                                        <div class="col-md-8 mb-3">
                                            <label for="nome" class="form-label fw-bold">Nome (Título)</label>
                                            <input type="text" class="form-control" id="nome" th:field="*{nome}" required>
                                        </div>
                                    </div>

                                    <div class="row">
                                        <div class="col-md-6 mb-3">
                                            <label for="categoria" class="form-label fw-bold">Categoria</label>
                                            <select class="form-select" id="categoria" th:field="*{categoria}" required>
                                                <option value="">Selecione uma categoria...</option>
                                                <option th:each="cat : ${categorias}" 
                                                        th:value="${cat.id}" 
                                                        th:text="${cat.nome}">Categoria</option>
                                            </select>
                                        </div>
                                        <div class="col-md-6 mb-3">
                                            <label for="marca" class="form-label fw-bold">Marca</label>
                                            <select class="form-select" id="marca" th:field="*{marca}">
                                                <option value="">Selecione uma marca...</option>
                                                <option th:each="m : ${marcas}" 
                                                        th:value="${m.id}" 
                                                        th:text="${m.nome}">Marca</option>
                                            </select>
                                        </div>
                                    </div>

                                    <div class="row">
                                        <div class="col-md-4 mb-3">
                                            <label for="preco" class="form-label fw-bold">Preço (R$)</label>
                                            <input type="number" step="0.01" class="form-control" id="preco" th:field="*{valor}" required>
                                        </div>
                                        <div class="col-md-8 mb-3">
                                            <label for="imagemUrl" class="form-label fw-bold">URL da Imagem</label>
                                            <input type="text" class="form-control" id="imagemUrl" th:field="*{imagemUrl}" required>
                                        </div>
                                    </div>

                                    <div class="mb-3">
                                        <label for="descricao" class="form-label fw-bold">Detalhes (Descrição Completa)</label>
                                        <textarea class="form-control" id="descricao" th:field="*{descricao}" rows="4"></textarea>
                                    </div>

                                    <div class="mb-4">
                                        <div class="form-check form-switch">
                                            <input class="form-check-input" type="checkbox" id="emDestaque" th:field="*{emDestaque}">
                                            <label class="form-check-label fw-bold" for="emDestaque">Produto em Destaque?</label>
                                        </div>
                                    </div>

                                    <div class="d-flex justify-content-end gap-3 pt-3 border-top">
                                        <a href="/administracao" class="btn btn-light btn-lg px-5">Cancelar</a>
                                        <button type="submit" class="btn btn-primary btn-lg px-5">
                                            <i class="fas fa-save me-2"></i>Salvar Brinquedo
                                        </button>
                                    </div>
                                </form>
                            </div>
                        </div>
                    </div>
                </div>
            </div>
        </div>

        <footer class="simple-footer bg-white">
            <div class="container text-center">
                <p class="mb-0">&copy; 2024 Be Happy. Todos os direitos reservados.</p>
            </div>
        </footer>
    </div>

    <script th:src="@{/js/live-search.js}"></script>
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
