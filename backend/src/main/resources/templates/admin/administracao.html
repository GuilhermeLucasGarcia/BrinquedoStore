<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Administração - BrinquedoStore</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link rel="stylesheet" th:href="@{/css/style.css}">
</head>
<body>

    <div class="container-fluid px-0">
        
        <!-- Header -->
        <div class="top-header">
            <div class="container-fluid">
                <div class="row align-items-center">
                    <div class="col-auto">
                        <div class="logo-box">
                            <i class="fas fa-shapes fa-lg"></i>
                        </div>
                    </div>
                    <div class="col">
                        <h1 class="store-title">BrinquedoStore</h1>
                    </div>
                </div>
            </div>
        </div>

        <div class="container-fluid px-4 pb-5">
            <div class="row g-4">
                <!-- Sidebar (Left) -->
                <div class="col-md-3 col-lg-2">
                    <div class="sidebar-container">
                        <div class="sidebar-header">
                            <i class="fas fa-bars me-2"></i> Menu
                        </div>
                        <ul class="sidebar-menu">
                            <li><a href="/"><i class="fas fa-home me-2"></i> Home</a></li>
                            <li><a href="/catalogo"><i class="fas fa-box-open me-2"></i> Catálogo</a></li>
                            <li><a href="/administracao" class="active"><i class="fas fa-cog me-2"></i> Administração</a></li>
                            <li><a href="/sobre"><i class="fas fa-users me-2"></i> Equipe</a></li>
                        </ul>
                    </div>
                </div>

                <!-- Main Content (Right) -->
                <div class="col-md-9 col-lg-10">
                    <div class="main-content">
                        <div class="d-flex justify-content-between align-items-center mb-4 border-bottom pb-3">
                            <h2 class="section-title mb-0 border-0 p-0">Gestão de Produtos</h2>
                            <a href="/administracao/novo" class="btn btn-primary shadow-sm">
                                <i class="fas fa-plus me-2"></i>Novo Brinquedo
                            </a>
                        </div>
                        
                        <div class="table-responsive rounded-3 border">
                            <table class="table table-hover align-middle mb-0">
                                <thead class="bg-light">
                                    <tr>
                                        <th scope="col" class="py-3 ps-4">Brinquedo</th>
                                        <th scope="col" class="py-3">Categoria</th>
                                        <th scope="col" class="py-3">Valor</th>
                                        <th scope="col" class="py-3 text-center">Ações</th>
                                    </tr>
                                </thead>
                                <tbody>
                                    <tr th:each="brinquedo : ${brinquedos}">
                                        <td class="ps-4">
                                            <div class="d-flex align-items-center">
                                                <div class="rounded bg-light p-1 me-3" style="width: 40px; height: 40px;">
                                                    <img th:src="${brinquedo.imagemUrl}" class="w-100 h-100" style="object-fit: contain;">
                                                </div>
                                                <span class="fw-bold text-dark" th:text="${brinquedo.nome}">Nome</span>
                                            </div>
                                        </td>
                                        <td><span class="badge bg-secondary bg-opacity-10 text-secondary rounded-pill px-3" th:text="${brinquedo.categoria}">Categoria</span></td>
                                        <td class="fw-bold text-primary" th:text="'R$ ' + ${#numbers.formatDecimal(brinquedo.valor, 0, 'COMMA', 2, 'POINT')}">R$ 50,00</td>
                                        <td class="text-center">
                                            <a th:href="@{/administracao/editar/{id}(id=${brinquedo.id})}" class="btn btn-sm btn-outline-primary me-2">
                                                <i class="fas fa-edit"></i>
                                            </a>
                                            <a th:href="@{/administracao/excluir/{id}(id=${brinquedo.id})}" class="btn btn-sm btn-outline-danger" onclick="return confirm('Tem certeza que deseja excluir?')">
                                                <i class="fas fa-trash"></i>
                                            </a>
                                        </td>
                                    </tr>
                                </tbody>
                            </table>
                        </div>
                    </div>
                </div>
            </div>
        </div>

        <footer class="simple-footer bg-white">
            <div class="container">
                <p class="mb-0">&copy; 2024 BrinquedoStore. Todos os direitos reservados.</p>
            </div>
        </footer>

    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
