<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Administração - BrinquedoStore</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link rel="stylesheet" th:href="@{/css/style.css}">
</head>
<body>

    <div class="container-fluid px-0">
        
        <!-- Header -->
        <div class="top-header">
            <div class="header-left">
                <a href="/" class="logo-container text-decoration-none">
                    <img th:src="@{/img/logo.png}" class="logo-be-happy" alt="Logo">
                    <span class="logo-text-be-happy">Be Happy</span>
                </a>
            </div>
            
            <div class="header-center">
                <div class="search-bar-container">
                    <div class="input-group">
                        <input type="text" class="form-control search-input rounded-pill ps-4"
                               placeholder="Buscar no painel administrativo..."
                               data-live-search-url="/api/search/admin">
                        <span class="position-absolute end-0 top-50 translate-middle-y pe-3 text-primary" style="z-index: 5;">
                            <i class="fas fa-search"></i>
                        </span>
                    </div>
                </div>
            </div>

            <div class="header-right">
                <div class="d-flex align-items-center gap-3">
                    <span class="text-white small"><i class="fas fa-user-shield me-1"></i> Admin</span>
                    <a href="/" class="btn btn-light btn-sm rounded-pill text-primary">Ver Loja</a>
                </div>
            </div>
        </div>

        <div class="container-fluid px-4 pb-5">
            <div class="row g-4">
                <!-- Sidebar (Left) -->
                <div class="col-md-3 col-lg-2">
                    <div class="sidebar-container">
                        <div class="sidebar-header">
                            <i class="fas fa-bars me-2"></i> Menu
                        </div>
                        <ul class="sidebar-menu">
                            <li><a href="/"><i class="fas fa-home me-2"></i> Home</a></li>
                            <li><a href="/catalogo"><i class="fas fa-box-open me-2"></i> Catálogo</a></li>
                            <li th:replace="fragments/sidebar :: adminMenu('produtos', true)"></li>
                            <li><a href="/sobre"><i class="fas fa-users me-2"></i> Equipe</a></li>
                        </ul>
                    </div>
                </div>

                <!-- Main Content (Right) -->
                <div class="col-md-9 col-lg-10">
                    <div class="main-content">
                        <div class="d-flex justify-content-between align-items-center mb-4 border-bottom pb-3">
                            <h2 class="section-title mb-0 border-0 p-0">Gestão de Produtos</h2>
                            <a href="/administracao/novo" class="btn btn-primary shadow-sm">
                                <i class="fas fa-plus me-2"></i>Novo Brinquedo
                            </a>
                        </div>

                        <div class="card shadow-sm border-0 rounded-4 mb-4">
                            <div class="card-body p-4">
                                <form method="get" th:action="@{/administracao}">
                                    <div class="row g-3 align-items-end">
                                        <div class="col-lg-8">
                                            <label for="nome" class="form-label fw-bold">Buscar por nome</label>
                                            <input type="text" class="form-control" id="nome" name="nome"
                                                   th:value="${nomeFiltro}" placeholder="Ex.: Lego, Boneco ou Carrinho">
                                        </div>
                                        <div class="col-lg-4 d-grid d-md-flex gap-2">
                                            <button type="submit" class="btn btn-primary w-100">
                                                <i class="fas fa-filter me-2"></i>Filtrar
                                            </button>
                                            <a href="/administracao" class="btn btn-outline-secondary w-100">Limpar</a>
                                        </div>
                                    </div>
                                </form>
                            </div>
                        </div>
                        
                        <div class="table-responsive rounded-3 border">
                            <table class="table table-hover align-middle mb-0">
                                <thead class="bg-light">
                                    <tr>
                                        <th scope="col" class="py-3 ps-4">Brinquedo</th>
                                        <th scope="col" class="py-3">Categoria</th>
                                        <th scope="col" class="py-3">Valor</th>
                                        <th scope="col" class="py-3 text-center">Ações</th>
                                    </tr>
                                </thead>
                                <tbody>
                                    <tr th:each="brinquedo : ${brinquedos}">
                                        <td class="ps-4">
                                            <div class="d-flex align-items-center">
                                                <div class="rounded bg-light p-1 me-3" style="width: 40px; height: 40px;">
                                                    <img th:src="${brinquedo.imagemUrl}" class="w-100 h-100" style="object-fit: contain;">
                                                </div>
                                                <span class="fw-bold text-dark" th:text="${brinquedo.nome}">Nome</span>
                                            </div>
                                        </td>
                                        <td><span class="badge bg-secondary bg-opacity-10 text-secondary rounded-pill px-3" th:text="${brinquedo.categoria.nome}">Categoria</span></td>
                                        <td class="fw-bold text-primary" th:text="'R$ ' + ${#numbers.formatDecimal(brinquedo.valor, 0, 'COMMA', 2, 'POINT')}">R$ 50,00</td>
                                        <td class="text-center">
                                            <a th:href="@{/administracao/editar/{id}(id=${brinquedo.id})}" class="btn btn-sm btn-outline-primary me-2">
                                                <i class="fas fa-edit"></i>
                                            </a>
                                            <a th:href="@{/administracao/excluir/{id}(id=${brinquedo.id})}" class="btn btn-sm btn-outline-danger" onclick="return confirm('Tem certeza que deseja excluir?')">
                                                <i class="fas fa-trash"></i>
                                            </a>
                                        </td>
                                    </tr>
                                    <tr th:if="${#lists.isEmpty(brinquedos)}">
                                        <td colspan="4" class="text-center py-4 text-muted">Nenhum produto encontrado para o filtro informado.</td>
                                    </tr>
                                </tbody>
                            </table>
                        </div>
                    </div>
                </div>
            </div>
        </div>

        <footer class="simple-footer bg-white">
            <div class="container text-center">
                <p class="mb-0">&copy; 2024 Be Happy. Todos os direitos reservados.</p>
            </div>
        </footer>

    </div>

    <script th:src="@{/js/live-search.js}"></script>
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
