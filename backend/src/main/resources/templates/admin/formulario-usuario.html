<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Formulário de Usuário - BrinquedoStore</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link rel="stylesheet" th:href="@{/css/style.css}">
</head>
<body>
<div class="container-fluid px-0">
    <div class="top-header">
        <div class="header-left">
            <a href="/" class="logo-container text-decoration-none">
                <img th:src="@{/img/logo.png}" class="logo-be-happy" alt="Logo">
                <span class="logo-text-be-happy">Be Happy</span>
            </a>
        </div>

        <div class="header-center">
            <div class="search-bar-container">
                <div class="input-group">
                    <input type="text" class="form-control search-input rounded-pill ps-4"
                           placeholder="Buscar no painel administrativo..."
                           data-live-search-url="/api/search/admin">
                    <span class="position-absolute end-0 top-50 translate-middle-y pe-3 text-primary" style="z-index: 5;">
                        <i class="fas fa-search"></i>
                    </span>
                </div>
            </div>
        </div>

        <div class="header-right">
            <div class="d-flex align-items-center gap-3">
                <span class="text-white small"><i class="fas fa-user-shield me-1"></i> Admin</span>
                <a href="/" class="btn btn-light btn-sm rounded-pill text-primary">Ver Loja</a>
            </div>
        </div>
    </div>

    <div class="container-fluid px-4 pb-5">
        <div class="row g-4">
            <div class="col-md-3 col-lg-2">
                <div class="sidebar-container">
                    <div class="sidebar-header">
                        <i class="fas fa-bars me-2"></i> Menu
                    </div>
                    <ul class="sidebar-menu">
                        <li><a href="/"><i class="fas fa-home me-2"></i> Home</a></li>
                        <li><a href="/catalogo"><i class="fas fa-box-open me-2"></i> Catálogo</a></li>
                        <li th:replace="fragments/sidebar :: adminMenu('usuarios', true)"></li>
                        <li><a href="/sobre"><i class="fas fa-users me-2"></i> Equipe</a></li>
                    </ul>
                </div>
            </div>

            <div class="col-md-9 col-lg-10">
                <div class="main-content">
                    <div class="d-flex justify-content-between align-items-center mb-4 border-bottom pb-3">
                        <h2 class="section-title mb-0 border-0 p-0"
                            th:text="${usuarioForm.id == null ? 'Novo Usuário' : 'Editar Usuário'}">Usuário</h2>
                        <a href="/administracao/usuarios" class="btn btn-outline-secondary btn-sm shadow-sm">
                            <i class="fas fa-arrow-left me-2"></i>Voltar
                        </a>
                    </div>

                    <div th:if="${erro}" class="alert alert-danger alert-dismissible fade show" role="alert">
                        <span th:text="${erro}">Revise os dados informados.</span>
                        <button type="button" class="btn-close" data-bs-dismiss="alert" aria-label="Close"></button>
                    </div>

                    <div class="card border-0 shadow-sm rounded-4">
                        <div class="card-body p-4">
                            <form th:action="@{/administracao/usuarios/salvar}" th:object="${usuarioForm}" method="post" novalidate>
                                <input type="hidden" th:field="*{id}">
                                <input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}">

                                <div class="row g-3">
                                    <div class="col-md-6">
                                        <label for="nome" class="form-label fw-bold">Nome</label>
                                        <input type="text" class="form-control"
                                               th:classappend="${#fields.hasErrors('nome')} ? 'is-invalid'"
                                               id="nome" th:field="*{nome}" maxlength="255" placeholder="Nome completo do integrante">
                                        <div class="invalid-feedback" th:errors="*{nome}">Nome inválido.</div>
                                    </div>

                                    <div class="col-md-6">
                                        <label for="nomeUsuario" class="form-label fw-bold">Nome de usuário</label>
                                        <input type="text" class="form-control"
                                               th:classappend="${#fields.hasErrors('nomeUsuario')} ? 'is-invalid'"
                                               id="nomeUsuario" th:field="*{nomeUsuario}" maxlength="255" placeholder="usuario.exemplo">
                                        <div class="invalid-feedback" th:errors="*{nomeUsuario}">Usuário inválido.</div>
                                    </div>

                                    <div class="col-md-6">
                                        <label for="email" class="form-label fw-bold">E-mail</label>
                                        <input type="email" class="form-control"
                                               th:classappend="${#fields.hasErrors('email')} ? 'is-invalid'"
                                               id="email" th:field="*{email}" maxlength="255" placeholder="usuario@exemplo.com">
                                        <div class="invalid-feedback" th:errors="*{email}">E-mail inválido.</div>
                                    </div>

                                    <div class="col-md-6">
                                        <label for="perfil" class="form-label fw-bold">Perfil</label>
                                        <select class="form-select" id="perfil" th:field="*{perfil}">
                                            <option th:value="${T(com.brinquedostore.api.model.PerfilUsuario).CLIENTE}">Cliente</option>
                                            <option th:value="${T(com.brinquedostore.api.model.PerfilUsuario).FUNCIONARIO}">Funcionário</option>
                                        </select>
                                    </div>

                                    <div class="col-md-6">
                                        <label for="imgUrl" class="form-label fw-bold">Imagem (URL)</label>
                                        <input type="url" class="form-control"
                                               th:classappend="${#fields.hasErrors('imgUrl')} ? 'is-invalid'"
                                               id="imgUrl" th:field="*{imgUrl}" maxlength="500" placeholder="https://exemplo.com/foto.jpg">
                                        <div class="invalid-feedback" th:errors="*{imgUrl}">URL inválida.</div>
                                    </div>

                                    <div class="col-md-4">
                                        <label class="form-label fw-bold">Última alteração</label>
                                        <input type="text" class="form-control"
                                               th:value="${usuarioForm.dtAlteracao != null ? #temporals.format(usuarioForm.dtAlteracao, 'dd/MM/yyyy HH:mm') : 'Será gerada automaticamente'}"
                                               readonly>
                                    </div>

                                    <div class="col-12">
                                        <label for="senha" class="form-label fw-bold">Senha</label>
                                        <input type="password" class="form-control"
                                               th:classappend="${#fields.hasErrors('senha')} ? 'is-invalid'"
                                               id="senha" th:field="*{senha}" maxlength="255"
                                               th:placeholder="${usuarioForm.id == null ? 'Defina a senha inicial' : 'Preencha apenas para alterar a senha'}">
                                        <div class="invalid-feedback" th:errors="*{senha}">Senha inválida.</div>
                                        <div class="form-text" th:text="${usuarioForm.id == null ? 'Obrigatória para novos usuários.' : 'Deixe em branco para manter a senha atual.'}">Senha</div>
                                    </div>
                                </div>

                                <div class="d-flex justify-content-end gap-3 pt-4 mt-4 border-top">
                                    <a href="/administracao/usuarios" class="btn btn-light btn-lg px-5">Cancelar</a>
                                    <button type="submit" class="btn btn-primary btn-lg px-5">
                                        <i class="fas fa-save me-2"></i>Salvar Usuário
                                    </button>
                                </div>
                            </form>
                        </div>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <footer class="simple-footer bg-white">
        <div class="container text-center">
            <p class="mb-0">&copy; 2024 Be Happy. Todos os direitos reservados.</p>
        </div>
    </footer>
</div>

<script th:src="@{/js/live-search.js}"></script>
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
