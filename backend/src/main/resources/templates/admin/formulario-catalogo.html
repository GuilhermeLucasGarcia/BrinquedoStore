<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Formulário de Catálogo - BrinquedoStore</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link rel="stylesheet" th:href="@{/css/style.css}">
</head>
<body>
<div class="container-fluid px-0">
    <div class="top-header">
        <div class="header-left">
            <a href="/" class="logo-container text-decoration-none">
                <img th:src="@{/img/logo.png}" class="logo-be-happy" alt="Logo">
                <span class="logo-text-be-happy">Be Happy</span>
            </a>
        </div>

        <div class="header-center">
            <div class="search-bar-container">
                <div class="input-group">
                    <input type="text" class="form-control search-input rounded-pill ps-4"
                           placeholder="Buscar no painel administrativo..."
                           data-live-search-url="/api/search/admin">
                    <span class="position-absolute end-0 top-50 translate-middle-y pe-3 text-primary" style="z-index: 5;">
                        <i class="fas fa-search"></i>
                    </span>
                </div>
            </div>
        </div>

        <div class="header-right">
            <div class="d-flex align-items-center gap-3">
                <span class="text-white small"><i class="fas fa-user-shield me-1"></i> Admin</span>
                <a href="/" class="btn btn-light btn-sm rounded-pill text-primary">Ver Loja</a>
                <form th:action="@{/logout}" method="post" class="d-inline">
                    <input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}">
                    <button type="submit" class="btn btn-outline-light btn-sm rounded-pill">Sair</button>
                </form>
            </div>
        </div>
    </div>

    <div class="container-fluid px-4 pb-5">
        <div class="row g-4">
            <div class="col-md-3 col-lg-2">
                <div class="sidebar-container">
                    <div class="sidebar-header">
                        <i class="fas fa-bars me-2"></i> Menu
                    </div>
                    <ul class="sidebar-menu">
                        <li><a href="/"><i class="fas fa-home me-2"></i> Home</a></li>
                        <li><a href="/catalogo"><i class="fas fa-box-open me-2"></i> Catálogo Público</a></li>
                        <li th:replace="fragments/sidebar :: adminMenu('catalogos', true)"></li>
                        <li><a href="/sobre"><i class="fas fa-users me-2"></i> Equipe</a></li>
                    </ul>
                </div>
            </div>

            <div class="col-md-9 col-lg-10">
                <div class="main-content">
                    <div class="d-flex flex-column flex-lg-row justify-content-between align-items-lg-center gap-3 mb-4">
                        <h2 class="section-title mb-0"
                            th:text="${categoria.id == null ? 'Novo Catálogo' : 'Editar Catálogo'}">Catálogo</h2>
                        <a href="/administracao/catalogos" class="btn btn-outline-secondary">
                            <i class="fas fa-arrow-left me-2"></i>Voltar
                        </a>
                    </div>

                    <div th:if="${erro}" class="alert alert-danger alert-dismissible fade show" role="alert">
                        <span th:text="${erro}">Erro ao salvar.</span>
                        <button type="button" class="btn-close" data-bs-dismiss="alert" aria-label="Close"></button>
                    </div>

                    <div class="card shadow-sm border-0 rounded-4">
                        <div class="card-body p-4">
                            <form th:action="@{/administracao/catalogos/salvar}" th:object="${categoria}" method="post" novalidate>
                                <input type="hidden" th:field="*{id}">
                                <input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}">

                                <div class="row g-3">
                                    <div class="col-md-6">
                                        <label for="nome" class="form-label fw-bold">Nome do catálogo</label>
                                        <input type="text" class="form-control"
                                               th:classappend="${#fields.hasErrors('nome')} ? 'is-invalid'"
                                               id="nome" th:field="*{nome}" maxlength="120" required>
                                        <div class="invalid-feedback" th:errors="*{nome}">Nome inválido.</div>
                                    </div>
                                    <div class="col-md-3">
                                        <label for="ativo" class="form-label fw-bold">Status</label>
                                        <select class="form-select" id="ativo" th:field="*{ativo}">
                                            <option th:value="true">Ativo</option>
                                            <option th:value="false">Inativo</option>
                                        </select>
                                    </div>
                                    <div class="col-md-3">
                                        <label for="imgUrl" class="form-label fw-bold">Imagem (URL)</label>
                                        <input type="url" class="form-control"
                                               th:classappend="${#fields.hasErrors('imgUrl')} ? 'is-invalid'"
                                               id="imgUrl" th:field="*{imgUrl}" maxlength="500" placeholder="https://exemplo.com/imagem.jpg">
                                        <div class="invalid-feedback" th:errors="*{imgUrl}">URL inválida.</div>
                                    </div>

                                    <div class="col-12">
                                        <label for="descricao" class="form-label fw-bold">Descrição</label>
                                        <textarea class="form-control"
                                                  th:classappend="${#fields.hasErrors('descricao')} ? 'is-invalid'"
                                                  id="descricao" th:field="*{descricao}" rows="5" maxlength="500" required></textarea>
                                        <div class="invalid-feedback" th:errors="*{descricao}">Descrição inválida.</div>
                                    </div>

                                    <div class="col-md-6">
                                        <label class="form-label fw-bold">Data de criação</label>
                                        <input type="text" class="form-control"
                                               th:value="${categoria.dtCriacao != null ? #temporals.format(categoria.dtCriacao, 'dd/MM/yyyy HH:mm') : 'Gerada automaticamente'}"
                                               readonly>
                                    </div>
                                    <div class="col-md-6">
                                        <label class="form-label fw-bold">Última modificação</label>
                                        <input type="text" class="form-control"
                                               th:value="${categoria.dtAlteracao != null ? #temporals.format(categoria.dtAlteracao, 'dd/MM/yyyy HH:mm') : 'Será atualizada ao salvar'}"
                                               readonly>
                                    </div>
                                </div>

                                <div class="d-flex justify-content-end gap-3 pt-4 mt-4 border-top">
                                    <a href="/administracao/catalogos" class="btn btn-light btn-lg px-5">Cancelar</a>
                                    <button type="submit" class="btn btn-primary btn-lg px-5">
                                        <i class="fas fa-save me-2"></i>Salvar Catálogo
                                    </button>
                                </div>
                            </form>
                        </div>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <footer class="simple-footer bg-white">
        <div class="container text-center">
            <p class="mb-0">&copy; 2024 Be Happy. Todos os direitos reservados.</p>
        </div>
    </footer>
</div>

<script th:src="@{/js/live-search.js}"></script>
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
