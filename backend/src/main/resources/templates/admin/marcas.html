<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Gestão de Marcas - BrinquedoStore</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link rel="stylesheet" th:href="@{/css/style.css}">
</head>
<body>

    <div class="container-fluid px-0">
        
        <!-- Header -->
        <div class="top-header">
            <div class="header-left">
                <a href="/" class="logo-container text-decoration-none">
                    <img th:src="@{/img/logo.png}" class="logo-be-happy" alt="Logo">
                    <span class="logo-text-be-happy">Be Happy</span>
                </a>
            </div>
            
            <div class="header-center">
                <div class="search-bar-container">
                    <div class="input-group">
                        <input type="text" class="form-control search-input rounded-pill ps-4" placeholder="Buscar marcas...">
                        <span class="position-absolute end-0 top-50 translate-middle-y pe-3 text-primary" style="z-index: 5;">
                            <i class="fas fa-search"></i>
                        </span>
                    </div>
                </div>
            </div>

            <div class="header-right">
                <div class="d-flex align-items-center gap-3">
                    <span class="text-white small"><i class="fas fa-user-shield me-1"></i> Admin</span>
                    <a href="/" class="btn btn-light btn-sm rounded-pill text-primary">Ver Loja</a>
                </div>
            </div>
        </div>

        <div class="container-fluid px-4 pb-5">
            <div class="row g-4">
                <!-- Sidebar (Left) -->
                <div class="col-md-3 col-lg-2">
                    <div class="sidebar-container">
                        <div class="sidebar-header">
                            <i class="fas fa-bars me-2"></i> Menu
                        </div>
                        <ul class="sidebar-menu">
                            <li><a href="/"><i class="fas fa-home me-2"></i> Home</a></li>
                            <li><a href="/catalogo"><i class="fas fa-box-open me-2"></i> Catálogo</a></li>
                            <li>
                                <a href="#adminSubmenu" data-bs-toggle="collapse" class="active" aria-expanded="true">
                                    <i class="fas fa-cog me-2"></i> Administração
                                </a>
                                <ul class="collapse show submenu" id="adminSubmenu">
                                    <li><a href="/administracao"><i class="fas fa-box me-2"></i> Produtos</a></li>
                                    <li><a href="/administracao/marcas" class="active"><i class="fas fa-tags me-2"></i> Marcas</a></li>
                                </ul>
                            </li>
                            <li><a href="/sobre"><i class="fas fa-users me-2"></i> Equipe</a></li>
                        </ul>
                    </div>
                </div>

                <!-- Main Content (Right) -->
                <div class="col-md-9 col-lg-10">
                    <div class="main-content">
                        <div class="d-flex justify-content-between align-items-center mb-4 border-bottom pb-3">
                            <h2 class="section-title mb-0 border-0 p-0">Gestão de Marcas</h2>
                            <a href="/administracao/marcas/novo" class="btn btn-primary shadow-sm">
                                <i class="fas fa-plus me-2"></i>Nova Marca
                            </a>
                        </div>
                        
                        <div class="table-responsive rounded-3 border">
                            <table class="table table-hover align-middle mb-0">
                                <thead class="bg-light">
                                    <tr>
                                        <th scope="col" class="py-3 ps-4">ID</th>
                                        <th scope="col" class="py-3">Nome da Marca</th>
                                        <th scope="col" class="py-3 text-center">Ações</th>
                                    </tr>
                                </thead>
                                <tbody>
                                    <tr th:each="marca : ${marcas}">
                                        <td class="ps-4" th:text="${marca.id}">1</td>
                                        <td class="fw-bold text-dark" th:text="${marca.nome}">Nome da Marca</td>
                                        <td class="text-center">
                                            <a th:href="@{/administracao/marcas/excluir/{id}(id=${marca.id})}" class="btn btn-sm btn-outline-danger" onclick="return confirm('Tem certeza que deseja excluir esta marca?')">
                                                <i class="fas fa-trash"></i>
                                            </a>
                                        </td>
                                    </tr>
                                    <tr th:if="${#lists.isEmpty(marcas)}">
                                        <td colspan="3" class="text-center py-4 text-muted">Nenhuma marca cadastrada.</td>
                                    </tr>
                                </tbody>
                            </table>
                        </div>
                    </div>
                </div>
            </div>
        </div>

        <footer class="simple-footer bg-white">
            <div class="container text-center">
                <p class="mb-0">&copy; 2024 Be Happy. Todos os direitos reservados.</p>
            </div>
        </footer>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
