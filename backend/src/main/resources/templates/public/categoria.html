<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title th:text="'Catálogo - ' + ${nomeCategoria}">Categoria - BrinquedoStore</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link rel="stylesheet" th:href="@{/css/style.css}">
</head>
<body>

    <div class="container-fluid px-4">
        
        <!-- Header -->
        <div class="row align-items-center top-header">
            <div class="col-auto">
                <div class="logo-box">
                    Logo
                </div>
            </div>
            <div class="col">
                <h1 class="store-title">BrinquedoStore</h1>
            </div>
        </div>

        <div class="row">
            <!-- Sidebar (Left) -->
            <div class="col-md-3 col-lg-2 ps-0 pe-4">
                <div class="sidebar-header">
                    MENU PRINCIPAL
                </div>
                <ul class="sidebar-menu">
                    <li><a href="/">Home</a></li>
                    <li><a href="/catalogo" class="active">Catálogo de Brinquedos</a></li>
                    <li><a href="/administracao">Administração</a></li>
                    <li><a href="/sobre">Sobre a equipe</a></li>
                </ul>
            </div>

            <!-- Main Content (Right) -->
            <div class="col-md-9 col-lg-10">
                <h2 class="section-title" th:text="'Catálogo de Brinquedos : : ' + ${#strings.toLowerCase(nomeCategoria)}">Catálogo de Brinquedos :: categoria</h2>
                
                <!-- Product Grid (3 cols) -->
                <div class="row row-cols-1 row-cols-md-2 row-cols-lg-3 g-4 mt-2">
                    <div class="col" th:each="brinquedo : ${brinquedos}">
                        <div class="product-card">
                            <div class="product-image-box">
                                <a th:href="@{/detalhes/{id}(id=${brinquedo.id})}">
                                    <img th:src="${brinquedo.imagemUrl}" class="product-img" th:alt="${brinquedo.nome}">
                                </a>
                                <!-- Pill overlay -->
                                <div class="product-pill" th:text="${brinquedo.nome}">Nome do Brinquedo</div>
                            </div>
                            <!-- Caption below -->
                            <div class="product-info text-center">
                                <div class="product-desc" th:text="${brinquedo.descricao}">Descrição do Brinquedo</div>
                                <div class="product-price" th:text="'R$ ' + ${#numbers.formatDecimal(brinquedo.valor, 0, 'COMMA', 2, 'POINT')}">R$ 99,90</div>
                            </div>
                        </div>
                    </div>
                </div>
            </div>
        </div>

        <!-- Footer -->
        <footer class="simple-footer">
        </footer>

    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
