<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Dashboard - BrinquedoStore</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link rel="stylesheet" th:href="@{/css/style.css}">
</head>
<body class="login-page">
<div class="login-shell">
    <div class="login-card-wrapper">
        <div class="login-card">
            <a href="/" class="login-brand text-decoration-none">
                <img th:src="@{/img/logo.png}" class="login-brand-logo" alt="Logo BrinquedoStore">
                <span class="login-brand-text">Be Happy</span>
            </a>

            <div class="login-card-header">
                <h2>Minha Conta</h2>
                <p>Seu cadastro foi realizado com sucesso.</p>
            </div>

            <div th:if="${dashboardMessage}" class="alert alert-success login-alert" role="alert">
                <i class="fas fa-circle-check"></i>
                <span th:text="${dashboardMessage}">Conta criada com sucesso.</span>
            </div>

            <div class="d-grid gap-3 mt-4">
                <a href="/" class="btn btn-primary login-submit-btn">Ir para a loja</a>
                <form th:action="@{/logout}" method="post" class="d-grid">
                    <input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}">
                    <button type="submit" class="btn btn-outline-secondary rounded-pill">Sair</button>
                </form>
            </div>
        </div>
    </div>
</div>
</body>
</html>
