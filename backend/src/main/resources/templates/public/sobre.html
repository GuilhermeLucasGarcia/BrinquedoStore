<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sobre a Equipe - BrinquedoStore</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link rel="stylesheet" th:href="@{/css/style.css}">
</head>
<body>

    <div class="container-fluid px-0">
        
        <!-- Header -->
        <div class="top-header">
            <div class="header-left">
                <a href="/" class="logo-container text-decoration-none">
                    <img th:src="@{/img/logo.png}" class="logo-be-happy" alt="Logo">
                    <span class="logo-text-be-happy">Be Happy</span>
                </a>
            </div>
            
            <div class="header-center">
                <div class="search-bar-container">
                    <div class="input-group">
                        <input type="text" class="form-control search-input rounded-pill ps-4"
                               placeholder="O que você está procurando?"
                               data-live-search-url="/api/search/public">
                        <span class="position-absolute end-0 top-50 translate-middle-y pe-3 text-primary" style="z-index: 5;">
                            <i class="fas fa-search"></i>
                        </span>
                    </div>
                </div>
            </div>

            <div class="header-right">
                <a th:if="${not usuarioAutenticado}" href="/login" class="btn btn-light btn-sm rounded-pill text-primary shadow-sm">
                    <i class="fas fa-right-to-bracket me-1"></i> Entrar
                </a>
                <a th:if="${usuarioFuncionario}" href="/administracao/catalogos" class="btn btn-light btn-sm rounded-pill text-primary shadow-sm">
                    <i class="fas fa-cog me-1"></i> Painel
                </a>
                <form th:if="${usuarioAutenticado}" th:action="@{/logout}" method="post" class="d-inline">
                    <input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}">
                    <button type="submit" class="btn btn-light btn-sm rounded-pill text-primary shadow-sm">
                        <i class="fas fa-arrow-right-from-bracket me-1"></i> Sair
                    </button>
                </form>
                <a href="/sacola" class="btn btn-light rounded-circle shadow-sm position-relative text-primary" style="width: 45px; height: 45px; display: flex; align-items: center; justify-content: center;">
                    <i class="fas fa-shopping-bag"></i>
                    <span th:if="${quantidadeTotal > 0}" th:text="${quantidadeTotal}" class="position-absolute top-0 start-100 translate-middle badge rounded-pill bg-danger border border-light" style="font-size: 0.6rem;">
                        0
                    </span>
                </a>
            </div>
        </div>

        <div class="container-fluid px-4 pb-5">
            <div class="row g-4">
                <!-- Sidebar (Left) -->
                <div class="col-md-3 col-lg-2">
                    <div class="sidebar-container">
                        <div class="sidebar-header">
                            <i class="fas fa-bars me-2"></i> Menu
                        </div>
                        <ul class="sidebar-menu">
                            <li><a href="/"><i class="fas fa-home me-2"></i> Home</a></li>
                            <li><a href="/catalogo"><i class="fas fa-box-open me-2"></i> Catálogo</a></li>
                            <li th:replace="fragments/sidebar :: adminMenu('', false)"></li>
                            <li><a href="/sobre" class="active"><i class="fas fa-users me-2"></i> Equipe</a></li>
                        </ul>
                    </div>
                </div>

                <!-- Main Content (Right) -->
                <div class="col-md-9 col-lg-10">
                    <div class="main-content">
                        <h2 class="section-title">Nossa Equipe</h2>
                        
                        <!-- Team Grid -->
                        <div class="row row-cols-1 row-cols-md-2 row-cols-lg-3 g-5 mt-2">
                            <div class="col" th:each="membro : ${equipe}">
                                <div class="text-center h-100">
                                    <div class="avatar-container mb-4 position-relative mx-auto">
                                        <img th:if="${membro.imgUrl != null and !#strings.isEmpty(membro.imgUrl)}"
                                             th:src="${membro.imgUrl}" alt="Foto do integrante"
                                             class="avatar-image">
                                        <i th:if="${membro.imgUrl == null or #strings.isEmpty(membro.imgUrl)}" class="fas fa-user fa-5x avatar-icon"></i>
                                        <div class="photo-badge rounded-pill shadow-sm">
                                            <i class="fas fa-camera me-1"></i> Foto
                                        </div>
                                    </div>
                                    <div class="p-3 bg-light rounded-3">
                                        <h4 class="fw-bold text-primary mb-1" th:text="${membro.nome}">Nome do Integrante</h4>
                                        <div class="text-secondary fw-bold"
                                             th:text="${membro.nomeUsuario != null and !#strings.isEmpty(membro.nomeUsuario)} ? '@' + membro.nomeUsuario : 'Membro da equipe'">Usuário</div>
                                    </div>
                                </div>
                            </div>
                        </div>
                    </div>
                </div>
            </div>
        </div>

        <footer class="simple-footer bg-white">
            <div class="container">
                <p class="mb-0">&copy; 2024 BrinquedoStore. Todos os direitos reservados.</p>
            </div>
        </footer>

    </div>

    <script th:src="@{/js/live-search.js}"></script>
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
