<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title th:text="${brinquedo.nome} + ' - BrinquedoStore'">Detalhes do Brinquedo</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link rel="stylesheet" th:href="@{/css/style.css}">
</head>
<body>

    <!-- Header -->
    <div class="top-header">
        <div class="header-left">
            <a href="/" class="logo-container text-decoration-none">
                <img th:src="@{/img/logo.png}" class="logo-be-happy" alt="Logo">
                <span class="logo-text-be-happy">Be Happy</span>
            </a>
        </div>
        
        <div class="header-center">
            <div class="search-bar-container">
                <div class="input-group">
                    <input type="text" class="form-control search-input rounded-pill ps-4"
                           placeholder="O que você está procurando?"
                           data-live-search-url="/api/search/public">
                    <span class="position-absolute end-0 top-50 translate-middle-y pe-3 text-primary" style="z-index: 5;">
                        <i class="fas fa-search"></i>
                    </span>
                </div>
            </div>
        </div>

        <div class="header-right">
            <a href="/sacola" class="btn btn-light rounded-circle shadow-sm position-relative text-primary" style="width: 45px; height: 45px; display: flex; align-items: center; justify-content: center;">
                <i class="fas fa-shopping-bag"></i>
                <span th:if="${quantidadeTotal > 0}" th:text="${quantidadeTotal}" class="position-absolute top-0 start-100 translate-middle badge rounded-pill bg-danger border border-light" style="font-size: 0.6rem;">
                    0
                </span>
            </a>
        </div>
    </div>

    <!-- Breadcrumb -->
    <div class="container mt-4">
        <nav aria-label="breadcrumb">
            <ol class="breadcrumb">
                <li class="breadcrumb-item"><a href="/" class="text-decoration-none text-muted">Home</a></li>
                <li class="breadcrumb-item"><a href="#" class="text-decoration-none text-muted" th:text="${brinquedo.categoria?.nome}">Categoria</a></li>
                <li class="breadcrumb-item active" aria-current="page" th:text="${brinquedo.nome}">Produto</li>
            </ol>
        </nav>
    </div>

    <!-- Product Details -->
    <div class="container mt-4">
        <div class="row g-5">
            <!-- Product Image -->
            <div class="col-lg-6">
                <div class="bg-white p-4 rounded-4 shadow-sm position-relative">
                    <img th:src="${brinquedo.imagemUrl}" class="img-fluid rounded-3 w-100" th:alt="${brinquedo.nome}" style="object-fit: contain; max-height: 500px;">
                    <button class="btn btn-light position-absolute top-0 end-0 m-4 rounded-circle shadow-sm text-danger" style="width: 45px; height: 45px;">
                        <i class="far fa-heart fa-lg"></i>
                    </button>
                </div>
                <div class="row g-2 mt-3">
                    <div class="col-3">
                        <div class="bg-white p-2 rounded-3 border border-primary border-2 cursor-pointer">
                            <img th:src="${brinquedo.imagemUrl}" class="img-fluid rounded-2" alt="Thumb">
                        </div>
                    </div>
                    <!-- Placeholders for gallery -->
                    <div class="col-3" th:each="i : ${#numbers.sequence(1, 3)}">
                        <div class="bg-white p-2 rounded-3 border cursor-pointer opacity-50">
                            <img th:src="${brinquedo.imagemUrl}" class="img-fluid rounded-2" alt="Thumb">
                        </div>
                    </div>
                </div>
            </div>

            <!-- Product Info -->
            <div class="col-lg-6">
                <span class="badge bg-primary bg-opacity-10 text-primary px-3 py-2 rounded-pill mb-3 fw-bold" th:text="${brinquedo.categoria?.nome}">Categoria</span>
                
                <h1 class="detail-title mb-2" th:text="${brinquedo.nome}">Nome do Brinquedo</h1>
                
                <div class="d-flex align-items-center mb-4">
                    <div class="text-warning me-2">
                        <i class="fas fa-star"></i>
                        <i class="fas fa-star"></i>
                        <i class="fas fa-star"></i>
                        <i class="fas fa-star"></i>
                        <i class="fas fa-star-half-alt"></i>
                    </div>
                    <span class="text-muted fw-bold">4.8</span>
                    <span class="mx-2 text-muted">•</span>
                    <span class="text-muted">128 avaliações</span>
                </div>

                <div class="detail-price mb-4" th:text="'R$ ' + ${#numbers.formatDecimal(brinquedo.valor, 0, 'COMMA', 2, 'POINT')}">R$ 99,90</div>

                <p class="lead text-muted mb-5" th:text="${brinquedo.descricao}">Descrição...</p>

                <!-- Actions -->
                <form th:action="@{/sacola/adicionar}" method="post" class="d-flex gap-3 mb-5">
                    <input type="hidden" name="id" th:value="${brinquedo.id}">
                    <div class="input-group" style="width: 140px;">
                        <button class="btn btn-outline-secondary border-end-0" type="button" onclick="changeQty(-1)"><i class="fas fa-minus"></i></button>
                        <input type="number" name="quantidade" id="quantidadeInput" class="form-control text-center border-start-0 border-end-0" value="1" min="1" style="max-width: 50px;">
                        <button class="btn btn-outline-secondary border-start-0" type="button" onclick="changeQty(1)"><i class="fas fa-plus"></i></button>
                    </div>
                    <button type="submit" class="btn btn-primary btn-lg-custom flex-grow-1 shadow-sm">
                        <i class="fas fa-shopping-bag me-2"></i> Adicionar à Sacola
                    </button>
                </form>

                <script>
                    function changeQty(val) {
                        let input = document.getElementById('quantidadeInput');
                        let newVal = parseInt(input.value) + val;
                        if (newVal >= 1) {
                            input.value = newVal;
                        }
                    }
                </script>

                <!-- Features -->
                <div class="row g-4 border-top pt-4">
                    <div class="col-6">
                        <div class="d-flex align-items-center">
                            <div class="bg-primary bg-opacity-10 p-3 rounded-circle text-primary me-3">
                                <i class="fas fa-truck"></i>
                            </div>
                            <div>
                                <h6 class="fw-bold mb-0">Frete Grátis</h6>
                                <small class="text-muted">Para todo o Brasil</small>
                            </div>
                        </div>
                    </div>
                    <div class="col-6">
                        <div class="d-flex align-items-center">
                            <div class="bg-primary bg-opacity-10 p-3 rounded-circle text-primary me-3">
                                <i class="fas fa-shield-alt"></i>
                            </div>
                            <div>
                                <h6 class="fw-bold mb-0">Garantia</h6>
                                <small class="text-muted">30 dias para troca</small>
                            </div>
                        </div>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <!-- Related Products -->
    <div class="container my-5 py-5">
        <h3 class="fw-bold mb-4">Quem viu, comprou também</h3>
        <div class="row row-cols-1 row-cols-md-4 g-4">
            <!-- Mock related products (using same data structure conceptually) -->
             <div class="col" th:each="i : ${#numbers.sequence(1, 4)}">
                <div class="card h-100 opacity-75">
                    <div class="card-img-wrapper bg-light">
                        <div class="d-flex align-items-center justify-content-center h-100 text-muted">
                            <i class="fas fa-image fa-2x"></i>
                        </div>
                    </div>
                    <div class="card-body">
                        <h6 class="card-title text-muted">Produto Relacionado</h6>
                        <span class="fw-bold text-muted">R$ 49,90</span>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <footer class="simple-footer bg-white border-top">
        <div class="container text-center">
            <p class="mb-0">&copy; 2024 Be Happy. Todos os direitos reservados.</p>
        </div>
    </footer>

    <script th:src="@{/js/live-search.js}"></script>
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
