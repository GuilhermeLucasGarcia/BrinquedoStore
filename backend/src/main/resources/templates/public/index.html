<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>BrinquedoStore</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link rel="stylesheet" th:href="@{/css/style.css}">
</head>
<body>

    <div class="container-fluid px-0">
        
        <!-- Header -->
        <div class="top-header">
            <div class="header-left">
                <a href="/" class="logo-container text-decoration-none">
                    <img th:src="@{/img/logo.png}" class="logo-be-happy" alt="Logo">
                    <span class="logo-text-be-happy">Be Happy</span>
                </a>
            </div>
            
            <div class="header-center">
                <div class="search-bar-container">
                    <div class="input-group">
                        <input type="text" class="form-control search-input rounded-pill ps-4" placeholder="O que você está procurando?">
                        <span class="position-absolute end-0 top-50 translate-middle-y pe-3 text-primary" style="z-index: 5;">
                            <i class="fas fa-search"></i>
                        </span>
                    </div>
                </div>
            </div>

            <div class="header-right">
                <a href="/sacola" class="btn btn-light rounded-circle shadow-sm position-relative text-primary" style="width: 45px; height: 45px; display: flex; align-items: center; justify-content: center;">
                    <i class="fas fa-shopping-bag"></i>
                    <span th:if="${quantidadeTotal > 0}" th:text="${quantidadeTotal}" class="position-absolute top-0 start-100 translate-middle badge rounded-pill bg-danger border border-light" style="font-size: 0.6rem;">
                        0
                    </span>
                </a>
            </div>
        </div>

        <div class="container-fluid px-4 pb-5">
            <div class="row g-4">
                <!-- Sidebar (Left) -->
                <div class="col-md-3 col-lg-2">
                    <div class="sidebar-container">
                        <div class="sidebar-header">
                            <i class="fas fa-bars me-2"></i> Menu
                        </div>
                        <ul class="sidebar-menu">
                            <li><a href="/" class="active"><i class="fas fa-home me-2"></i> Home</a></li>
                            <li><a href="/catalogo"><i class="fas fa-box-open me-2"></i> Catálogo</a></li>
                            <li>
                                <a href="#adminSubmenu" data-bs-toggle="collapse" class="collapsed">
                                    <i class="fas fa-cog me-2"></i> Administração
                                </a>
                                <ul class="collapse submenu" id="adminSubmenu">
                                    <li><a href="/administracao"><i class="fas fa-box me-2"></i> Produtos</a></li>
                                    <li><a href="/administracao/marcas"><i class="fas fa-tags me-2"></i> Marcas</a></li>
                                </ul>
                            </li>
                            <li><a href="/sobre"><i class="fas fa-users me-2"></i> Equipe</a></li>
                        </ul>
                    </div>
                </div>

                <!-- Main Content (Right) -->
                <div class="col-md-9 col-lg-10">
                    <div class="main-content">
                        <h2 class="section-title">Brinquedos em Destaque</h2>
                        
                        <!-- Product Grid -->
                        <div class="row row-cols-1 row-cols-md-2 row-cols-lg-3 row-cols-xl-4 g-4">
                            <div class="col" th:each="brinquedo : ${brinquedos}">
                                <div class="product-card">
                                    <div class="product-image-box">
                                        <a th:href="@{/detalhes/{id}(id=${brinquedo.id})}">
                                            <img th:src="${brinquedo.imagemUrl}" class="product-img" th:alt="${brinquedo.nome}">
                                        </a>
                                        <div class="product-pill" th:text="${brinquedo.categoria != null ? brinquedo.categoria.nome : 'Sem Categoria'}">Categoria</div>
                                    </div>
                                    <div class="product-info">
                                        <a th:href="@{/detalhes/{id}(id=${brinquedo.id})}" class="text-decoration-none">
                                            <div class="product-desc" th:text="${brinquedo.nome}">Nome do Brinquedo</div>
                                        </a>
                                        <div class="product-price" th:if="${brinquedo.valor != null}" th:text="'R$ ' + ${#numbers.formatDecimal(brinquedo.valor, 0, 'COMMA', 2, 'POINT')}">R$ 99,90</div>
                                        <div class="product-price" th:unless="${brinquedo.valor != null}">R$ --,--</div>
                                    </div>
                                </div>
                            </div>
                        </div>
                    </div>
                </div>
            </div>
        </div>

        <!-- Footer -->
        <footer class="simple-footer bg-white border-top">
            <div class="container text-center">
                <p class="mb-0">&copy; 2024 Be Happy. Todos os direitos reservados.</p>
            </div>
        </footer>

    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
