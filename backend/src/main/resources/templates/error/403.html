<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Acesso Negado - BrinquedoStore</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link rel="stylesheet" th:href="@{/css/style.css}">
</head>
<body class="login-page">
<div class="login-shell">
    <div class="login-card-wrapper">
        <div class="login-card text-center">
            <a href="/" class="login-brand text-decoration-none">
                <img th:src="@{/img/logo.png}" class="login-brand-logo" alt="Logo BrinquedoStore">
                <span class="login-brand-text">Be Happy</span>
            </a>

            <div class="login-card-header">
                <h2>403</h2>
                <p>Você não tem permissão para acessar esta área.</p>
            </div>

            <div class="login-footer-note justify-content-center mt-3">
                <i class="fas fa-arrow-left"></i>
                <a href="/">Voltar para a página inicial</a>
            </div>
        </div>
    </div>
</div>
</body>
</html>
