<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Esqueci Minha Senha - BrinquedoStore</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link rel="stylesheet" th:href="@{/css/style.css}">
</head>
<body class="login-page">
<div class="login-shell">
    <div class="login-card-wrapper">
        <div class="login-card">
            <a href="/" class="login-brand text-decoration-none">
                <img th:src="@{/img/logo.png}" class="login-brand-logo" alt="Logo BrinquedoStore">
                <span class="login-brand-text">Be Happy</span>
            </a>

            <div class="login-card-header">
                <h2>Esqueci Minha Senha</h2>
                <p>Informe o e-mail cadastrado para receber o link seguro de redefinição.</p>
            </div>

            <div th:if="${forgotPasswordError}" class="alert alert-danger login-alert" role="alert">
                <i class="fas fa-circle-exclamation"></i>
                <span th:text="${forgotPasswordError}">Não foi possível concluir a solicitação.</span>
            </div>

            <form th:action="@{/esqueci-senha}" th:object="${forgotPasswordForm}" method="post" class="login-form" novalidate>
                <input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}">

                <div class="login-form-group">
                    <label for="forgotEmail">E-mail</label>
                    <div class="login-input-group">
                        <i class="fas fa-envelope"></i>
                        <input id="forgotEmail"
                               th:field="*{email}"
                               type="email"
                               class="form-control"
                               th:classappend="${#fields.hasErrors('email')} ? ' is-invalid'"
                               placeholder="voce@exemplo.com"
                               autocomplete="email"
                               required>
                    </div>
                    <small class="login-inline-error" th:errors="*{email}"></small>
                </div>

                <button type="submit" class="btn btn-primary login-submit-btn" data-loading-text="Enviando link...">
                    <span>Enviar Link</span>
                </button>
            </form>

            <div class="login-footer-note">
                <i class="fas fa-arrow-left"></i>
                <a href="/login">Voltar para o login</a>
            </div>
        </div>
    </div>
</div>

<script>
    document.addEventListener('DOMContentLoaded', function () {
        document.querySelectorAll('form').forEach(function (form) {
            form.addEventListener('submit', function () {
                const button = form.querySelector('[type="submit"][data-loading-text]');
                if (!button) return;
                button.disabled = true;
                button.innerHTML = '<span>' + button.dataset.loadingText + '</span>';
            });
        });
    });
</script>
</body>
</html>
