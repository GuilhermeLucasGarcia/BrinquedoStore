# Configuração Híbrida: Tenta conectar no Postgres do Supabase, mas com fallback para H2 se falhar
# Isso permite que a aplicação suba no Render e você veja os logs reais de erro do banco, em vez de 502 Bad Gateway
# Porta 6543 (Pooler) geralmente é mais estável para serverless
spring.datasource.url=${DB_URL:jdbc:postgresql://aws-0-sa-east-1.pooler.supabase.com:6543/postgres?sslmode=disable&preparedThreshold=0}
spring.datasource.username=${DB_USERNAME:postgres.qcpdmmnalmbzlgqccmih}
spring.datasource.password=${DB_PASSWORD:Projetoles123}
spring.datasource.driver-class-name=org.postgresql.Driver

spring.jpa.database-platform=org.hibernate.dialect.PostgreSQLDialect
spring.jpa.hibernate.ddl-auto=none
spring.jpa.hibernate.naming.physical-strategy=org.hibernate.boot.model.naming.PhysicalNamingStrategyStandardImpl
spring.jpa.show-sql=true
spring.thymeleaf.cache=false
server.port=${PORT:8080}
